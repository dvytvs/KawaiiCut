<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KawaiiCut</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Expanded Font Collection -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Anton&family=Bangers&family=Orbitron:wght@400;700&family=Pacifico&family=Roboto:wght@400;700;900&family=Montserrat:wght@400;700&family=Lobster&family=Oswald:wght@400;700&family=Playfair+Display:wght@400;700&family=Permanent+Marker&family=Comfortaa:wght@400;700&family=Dancing+Script:wght@700&family=Caveat:wght@700&family=Shadows+Into+Light&family=Abril+Fatface&family=Righteous&family=Fredoka+One&family=Monoton&family=Creepster&family=Gloria+Hallelujah&family=Cinzel:wght@700&family=Courgette&family=Russo+One&family=Press+Start+2P&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              // Existing
              anton: ['Anton', 'sans-serif'],
              bangers: ['Bangers', 'cursive'],
              orbitron: ['Orbitron', 'sans-serif'],
              pacifico: ['Pacifico', 'cursive'],
              // New
              dancing: ['Dancing Script', 'cursive'],
              caveat: ['Caveat', 'cursive'],
              shadows: ['Shadows Into Light', 'cursive'],
              abril: ['Abril Fatface', 'cursive'],
              righteous: ['Righteous', 'cursive'],
              fredoka: ['Fredoka One', 'cursive'],
              monoton: ['Monoton', 'cursive'],
              creepster: ['Creepster', 'cursive'],
              gloria: ['Gloria Hallelujah', 'cursive'],
              cinzel: ['Cinzel', 'serif'],
              courgette: ['Courgette', 'cursive'],
              russo: ['Russo One', 'sans-serif'],
              pixel: ['Press Start 2P', 'cursive'],
            },
            colors: {
              bg: {
                main: 'var(--bg-main)',       
                sidebar: 'var(--bg-sidebar)', 
                panel: 'var(--bg-panel)',     
                timeline: 'var(--bg-timeline)',
                header: 'var(--bg-header)',
                input: 'var(--bg-input)',
                card: 'var(--bg-card)',
              },
              text: {
                main: 'var(--text-main)',
                muted: 'var(--text-muted)',
              },
              primary: {
                DEFAULT: 'var(--primary)',
                hover: 'var(--primary-hover)',
                dim: 'var(--primary-dim)',
              },
              accent: {
                purple: 'var(--accent)', 
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-out forwards',
              'slide-up': 'slideUp 0.4s ease-out forwards',
              'scale-in': 'scaleIn 0.2s ease-out forwards',
              'bounce-soft': 'bounceSoft 2s infinite',
              'fall': 'fall linear infinite',
              'rain': 'rain 0.5s linear infinite',
              'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) infinite',
              'flash': 'flash 1s infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              scaleIn: {
                '0%': { opacity: '0', transform: 'scale(0.95)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              bounceSoft: {
                '0%, 100%': { transform: 'translateY(-2px)' },
                '50%': { transform: 'translateY(2px)' },
              },
              fall: {
                '0%': { transform: 'translateY(-10vh) translateX(0) rotate(0deg)', opacity: '1' },
                '100%': { transform: 'translateY(110vh) translateX(20px) rotate(360deg)', opacity: '0' }
              },
              rain: {
                '0%': { transform: 'translateY(-10vh)', opacity: '0' },
                '50%': { opacity: '1' },
                '100%': { transform: 'translateY(110vh)', opacity: '0.3' }
              },
              shake: {
                '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
              },
              flash: {
                '0%, 100%': { opacity: '0' },
                '50%': { opacity: '0.5' }
              }
            }
          },
        },
      }
    </script>
    <style>
      :root {
        --bg-main: #141414;      
        --bg-sidebar: #1f1f1f;   
        --bg-panel: #252525;     
        --bg-timeline: #141414; 
        --bg-header: #1f1f1f;    
        --bg-input: #18181b;
        --bg-card: #27272a;
        --text-main: #ffffff;
        --text-muted: #a1a1aa;
        --primary: #7851a9;      
        --primary-hover: #8b5cf6;
        --primary-dim: rgba(120, 81, 169, 0.2);
        --accent: #6366f1;
      }
      body { background-color: var(--bg-main); color: var(--text-main); overflow: hidden; }
      div, button, input, span, svg, img, textarea, select {
        transition-property: background-color, border-color, color, opacity, transform, box-shadow;
        transition-duration: 200ms;
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #666; }
      input[type=range] { @apply appearance-none bg-transparent; }
      input[type=range]::-webkit-slider-thumb { @apply appearance-none w-3 h-3 bg-white rounded-full cursor-pointer shadow-md -mt-1 hover:scale-125 transition-transform; }
      input[type=range]::-webkit-slider-runnable-track { @apply w-full h-1 bg-gray-600 rounded-lg cursor-pointer; }
      
      /* Scanlines for VHS effect */
      .scanlines {
        background: linear-gradient(
          to bottom,
          rgba(255,255,255,0),
          rgba(255,255,255,0) 50%,
          rgba(0,0,0,0.2) 50%,
          rgba(0,0,0,0.2)
        );
        background-size: 100% 4px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "idb": "https://esm.sh/idb@^8.0.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
  <body class="text-text-main antialiased overflow-hidden w-screen h-screen bg-bg-main">
    <div id="root" class="w-full h-full"></div>
  </body>
</html>
